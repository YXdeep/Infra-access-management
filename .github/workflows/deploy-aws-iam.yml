name: Deploy AWS IAM and Linux Users

on:
  push:
    branches:
      - main
    paths:
      - 'users.yaml'
      - 'terraform/**'
      - 'ansible-playbook.yml'

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    # Forces all actions to run on Node.js 24 regardless of their declared target.
    # Required until GitHub officially ships Node.js 24 builds of checkout/setup-python.
    # Tracked upstream: https://github.com/actions/runner/issues/4295
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install pyyaml
          pip install ansible

      - name: Pre-Deployment Identity Check
        run: |
          python -c "
          import yaml, sys

          with open('users.yaml', 'r') as f:
              data = yaml.safe_load(f)

          usernames = [user.get('Username') for user in data.get('Users', [])]

          if 'String' in usernames:
              print('DEPLOYMENT BLOCKED: Replace placeholder \"String\" with real unique usernames!')
              sys.exit(1)

          if len(usernames) != len(set(usernames)):
              print('DEPLOYMENT BLOCKED: Duplicate usernames detected in users.yaml!')
              sys.exit(1)

          print('Identity check passed.')
          "

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run Terraform (AWS Provisioning)
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve -input=false

      - name: Setup SSH Key for Linux Deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LINUX_DEPLOYMENT_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Run Ansible Playbook (Linux Provisioning)
        run: |
          ansible-playbook \
            -i "${{ secrets.LINUX_HOST }}," \
            -u ubuntu \
            --private-key=~/.ssh/id_rsa \
            ansible-playbook.yml \
            --ssh-common-args='-o StrictHostKeyChecking=no'
