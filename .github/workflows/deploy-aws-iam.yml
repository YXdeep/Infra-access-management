name: Deploy AWS IAM and Linux Users

on:
  push:
    branches:
      - main
    paths:
      - 'users.yaml'
      - 'terraform/**'
      - 'ansible-playbook.yml'

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install pyyaml
          pip install ansible

      - name: Pre-Deployment Identity Check
        run: |
          python -c "
          import yaml
          import sys

          with open('users.yaml', 'r') as f:
              data = yaml.safe_load(f)
          
          usernames = [user.get('Username') for user in data.get('Users', [])]
          if 'String' in usernames:
              print('DEPLOYMENT BLOCKED: Replace placeholder \"String\" with unique usernames!')
              sys.exit(1)
          if len(usernames) != len(set(usernames)):
              print('DEPLOYMENT BLOCKED: Duplicate usernames found!')
              sys.exit(1)
          "

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run Terraform (AWS Provisioning)
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve -input=false

      - name: Setup SSH Key for Linux Deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LINUX_DEPLOYMENT_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Run Ansible Playbook (Linux Provisioning)
        run: |
          ansible-playbook -i "${{ secrets.LINUX_HOST }}," -u ubuntu --private-key=~/.ssh/id_rsa ansible-playbook.yml --ssh-common-args='-o StrictHostKeyChecking=no'
