name: Deploy Linux Users

on:
  push:
    branches:
      - main
    paths:
      - 'users.yaml'
      - 'ansible-playbook.yml'

concurrency:
  group: production-deployment
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install pyyaml
          pip install ansible

      - name: Pre-Deployment Identity Check
        run: |
          python -c "
          import yaml, sys

          with open('users.yaml', 'r') as f:
              data = yaml.safe_load(f)

          usernames = [user.get('Username') for user in data.get('Users', [])]

          if 'String' in usernames:
              print('DEPLOYMENT BLOCKED: Replace placeholder \"String\" with real unique usernames!')
              sys.exit(1)

          if len(usernames) != len(set(usernames)):
              print('DEPLOYMENT BLOCKED: Duplicate usernames detected in users.yaml!')
              sys.exit(1)

          print('Identity check passed.')
          "

      - name: Setup SSH Key for Linux Deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LINUX_DEPLOYMENT_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Run Ansible Playbook (Linux Provisioning)
        run: |
          ansible-playbook \
            -i "${{ secrets.LINUX_HOST }}," \
            -u ubuntu \
            --private-key=~/.ssh/id_rsa \
            ansible-playbook.yml \
            --ssh-common-args='-o StrictHostKeyChecking=no'
